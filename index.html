<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauté Studio — Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- ══════════════════════════════════════
     ЭКРАН ВХОДА
══════════════════════════════════════ -->
    <div id="login-screen">
      <div class="login-box">
        <div class="login-logo">Beauté<br />Studio</div>
        <div class="login-sub">Панель администратора</div>

        <label class="login-label">Логин</label>
        <input
          class="login-input"
          id="l-login"
          type="text"
          placeholder="admin"
          autocomplete="username"
        />

        <label class="login-label">Пароль</label>
        <input
          class="login-input"
          id="l-pass"
          type="password"
          placeholder="••••••"
          autocomplete="current-password"
        />

        <div class="login-err" id="l-err"></div>
        <button class="login-btn" onclick="doLogin()">Войти</button>
      </div>
    </div>

    <!-- ══════════════════════════════════════
     ПРИЛОЖЕНИЕ
══════════════════════════════════════ -->
    <div id="app">
      <!-- Боковая панель (десктоп) -->
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="logo-title">Beauté<br />Studio</div>
          <div class="logo-sub">Администратор</div>
        </div>
        <nav id="sidebar-nav"></nav>
        <div class="sidebar-filter" id="sidebar-filter">
          <div class="filter-title">Фильтр</div>
        </div>
      </div>

      <!-- Основной контент -->
      <div class="main">
        <!-- Шапка (только мобильный) -->
        <div class="mobile-topbar">
          <div>
            <div class="mobile-brand">Beauté Studio</div>
            <div class="mobile-brand-sub">Администратор</div>
          </div>
          <button class="add-btn" onclick="openNewModal()">+ Запись</button>
        </div>

        <!-- Карточки статистики -->
        <div class="stats-grid" id="stats-cards"></div>

        <!-- Заголовок страницы (только десктоп) -->
        <div class="page-header" id="page-header">
          <div>
            <div class="page-title" id="page-title">Расписание</div>
            <div class="date-nav" id="date-nav">
              <button class="nav-btn" onclick="changeDay(-1)">‹</button>
              <span id="date-label"></span>
              <button class="nav-btn" onclick="changeDay(1)">›</button>
              <button
                class="nav-btn today-nav-btn"
                id="today-btn"
                onclick="goToday()"
              >
                Сегодня
              </button>
            </div>
          </div>
          <button class="add-btn" onclick="openNewModal()">
            + Новая запись
          </button>
        </div>

        <!-- Заголовок раздела (только мобильный) -->
        <div class="mob-section-title" id="mob-title"></div>
        <!-- Лента дат (только мобильный + расписание) -->
        <div class="date-strip" id="date-strip"></div>

        <!-- Вьюхи -->
        <div id="view-calendar"></div>
        <div id="view-list" style="display: none"></div>
        <div id="view-stats" style="display: none"></div>
      </div>

      <!-- Нижняя навигация (только мобильный) -->
      <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>

    <!-- ══════════════════════════════════════
     МОДАЛЬНОЕ ОКНО
══════════════════════════════════════ -->
    <div
      class="modal-overlay"
      id="modal"
      style="display: none"
      onclick="closeModal()"
    >
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title" id="modal-title">Новая запись</div>

        <label class="form-label">Имя клиента</label>
        <input class="form-input" id="f-name" placeholder="Иванова Виктория" />

        <label class="form-label">Телефон</label>
        <input
          class="form-input"
          id="f-phone"
          placeholder="+7 (___) ___-__-__"
          maxlength="18"
          inputmode="tel"
          oninput="handlePhone(this)"
        />
        <div class="form-hint">Формат: +7 (XXX) XXX-XX-XX</div>

        <div class="form-grid">
          <div>
            <label class="form-label">Дата</label>
            <input class="form-input" type="date" id="f-date" />
          </div>
          <div>
            <label class="form-label">Время</label>
            <select class="form-select" id="f-time"></select>
          </div>
        </div>

        <label class="form-label">Услуга</label>
        <select class="form-select" id="f-service"></select>

        <label class="form-label">Мастер</label>
        <select class="form-select" id="f-master"></select>

        <label class="form-label">Статус</label>
        <select class="form-select" id="f-status"></select>

        <label class="form-label">Примечание</label>
        <input
          class="form-input"
          id="f-notes"
          placeholder="Особые пожелания..."
        />

        <div class="form-err" id="form-err"></div>
        <div class="btn-row" id="btn-row"></div>
      </div>
    </div>

    <!-- Уведомление -->
    <div class="toast" id="toast"></div>

    <!-- ══════════════════════════════════════
     СКРИПТЫ (порядок важен!)
══════════════════════════════════════ -->
    <script src="js/constants.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/render.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
